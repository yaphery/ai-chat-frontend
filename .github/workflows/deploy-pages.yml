name: Deploy to GitHub Pages (gh-pages)
on:
  push:
    branches:
      - master   # 换成你的默认分支：master 或 main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for build)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure dist exists
        run: mkdir -p ./dist

      - name: Ensure 404 fallback exists (no heredoc)
        run: |
          mkdir -p ./dist
          if [ ! -f ./dist/404.html ]; then
            # 直接用单行 echo 写入文件，避免 heredoc 缩进/结束符问题
            echo '<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Loading...</title></head><body><script>var p=location.pathname;location.replace("./index.html#"+p);</script></body></html>' > ./dist/404.html
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "deploy: pages from GitHub Actions"