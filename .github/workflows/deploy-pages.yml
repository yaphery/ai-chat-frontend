name: Deploy to GitHub Pages (gh-pages)
on:
  push:
    branches:
      - master   # 改为你的默认分支：master 或 main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for build)
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # 推荐和本地一致

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build    # 请确保输出到 ./dist

      - name: Create a simple 404 redirect (hash-fallback)
        run: |
          mkdir -p ./dist
          # 简单的 hash fallback: 保证 browser-based routing 能用
          echo '<!doctype html><html><head><meta charset="utf-8"/></head><body><script>location.replace("./index.html#"+location.pathname);</script></body></html>' > ./dist/404.html

      - name: Deploy to gh-pages (publish ./dist to gh-pages branch)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}