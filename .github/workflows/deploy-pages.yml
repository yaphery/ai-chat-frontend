name: Deploy to GitHub Pages (gh-pages branch)
on:
  push:
    branches:
      - master   # 或 main，按你实际分支改

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build   # 输出到 ./dist

      - name: Ensure 404 fallback exists
        run: |
          # 如果你已经在构建流程里生成了 dist/404.html，可删除这步
          if [ ! -f ./dist/404.html ]; then
            cat > ./dist/404.html <<'HTML'
            <!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Loading…</title></head><body><script>
            (function(){ var index='./index.html'; fetch(index).then(r=>r.text()).then(html=>{ document.open(); document.write(html); document.close(); history.replaceState(null,'','/' + location.pathname.split('/').slice(1).join('/')); window.dispatchEvent(new Event('popstate')); }).catch(()=>location.replace(index)); })();
            </script></body></html>
            HTML
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # optional: keep history/commit message
          commit_message: "deploy: pages from GitHub Actions"