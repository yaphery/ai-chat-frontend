name: Deploy to GitHub Pages (gh-pages)
on:
  push:
    branches:
      - master  # 或 main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for build)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure dist exists
        run: mkdir -p ./dist

      - name: Ensure 404 fallback exists
        run: |
          if [ ! -f ./dist/404.html ]; then
            cat > ./dist/404.html <<'HTML'
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting…</title>
</head>
<body>
<script>
(function () {
  var index = './index.html';
  fetch(index, { cache: "no-store" }).then(function (r) {
    if (!r.ok) throw new Error('index fetch failed');
    return r.text();
  }).then(function (html) {
    document.open();
    document.write(html);
    document.close();
    var path = location.pathname;
    if (path && path !== '/' && path !== '') {
      history.replaceState(null, '', '/#' + path);
      dispatchEvent(new Event('hashchange'));
    }
  }).catch(function () {
    location.replace(index);
  });
})();
</script>
</body>
</html>
HTML
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "deploy: pages from GitHub Actions"